arquitectura_UML:
  description: >
    Al crear la arquitectura UML, se deben considerar los siguientes aspectos:
    1. Identificar los componentes principales del sistema y sus relaciones.
    2. Definir los diagramas UML necesarios para representar la arquitectura del sistema.
    3. Tomar en cuenta diagramas estructurales, de comportamiento, dinámicos y de implementación.

  expected_output: >
    Teniendo en cuenta el {system}, analiza cada parte que se requiera en cada diagrama,
    ya sean actores, casos de uso, clases, objetos, componentes, paquetes, actividades, estados, secuencias, colaboraciones, despliegue o cualquier otro elemento relevante para representar la arquitectura del sistema de manera clara y precisa.
  agent: analista_sistemas
