generar_codigo_uml:
  description: >
    Basándote en el reporte de arquitectura {architecture_report}, genera el código fuente PlantUML para cada diagrama necesario.
  expected_output: >
    Bloques de código PlantUML válidos para cada diagrama identificado.
  agent: desarrollador_uml

desplegar_diagramas:
  description: >
    Toma los diagramas generados y utiliza tus habilidades de despliegue para organizarlos, convertirlos a PNG y subirlos a Google Drive para el proyecto {system_name}.
  expected_output: >
    Confirmación de la estructura de carpetas creada y los enlaces de los archivos subidos.
  agent: especialista_despliegue
